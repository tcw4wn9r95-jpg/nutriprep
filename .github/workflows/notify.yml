name: "NutriPrep — Send Reminders"

on:
  schedule:
    # Every 15 minutes (GitHub Actions minimum granularity)
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send due reminders
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: python notify.py

      - name: Commit updated notification state
        run: |
          git config user.name "Coach Léa"
          git config user.email "lea@nutriprep.local"
          git add \
            notif_schedule.json \
            users/diego/push_subscriptions.json \
            users/diana/push_subscriptions.json
          git diff --staged --quiet && exit 0
          git commit -m "Notification state $(date +%Y-%m-%d %H:%M)"
          git pull --rebase origin main
          git push
